<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة غير موجودة | Muhammed Yasser - SEO Specialist</title>
    <meta name="robots" content="noindex, follow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Inter:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0F172A;
            --accent: #3B82F6;
            --accent2: #06B6D4;
            --accent3: #8B5CF6;
            --text: #F1F5F9;
            --text-secondary: #94A3B8;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(59, 130, 246, 0.2);
            --gradient1: linear-gradient(135deg, #3B82F6, #06B6D4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', 'Inter', sans-serif; background: var(--primary); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 30px; }
        .bg-animation { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
        .bg-animation .circle { position: absolute; border-radius: 50%; opacity: 0.04; animation: float 20s infinite ease-in-out; }
        .bg-animation .circle:nth-child(1) { width: 600px; height: 600px; background: var(--accent); top: -200px; right: -200px; }
        .bg-animation .circle:nth-child(2) { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; left: -100px; animation-delay: -5s; }
        .bg-animation .circle:nth-child(3) { width: 300px; height: 300px; background: var(--accent3); top: 50%; left: 50%; animation-delay: -10s; }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.03); }
            75% { transform: translate(40px, 20px) scale(1.05); }
        }
        .box { text-align: center; max-width: 560px; }
        .search-pill { display: inline-flex; align-items: center; gap: 10px; background: rgba(15, 23, 42, 0.92); border: 1px solid var(--border); border-radius: 50px; padding: 12px 22px; margin-bottom: 28px; direction: ltr; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35); }
        .search-pill .q { font-family: 'Inter', sans-serif; font-size: 0.9rem; color: var(--text-secondary); }
        .search-pill .caret { width: 2px; height: 16px; background: var(--accent); animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        h1 { font-size: 7rem; font-weight: 900; font-family: 'Inter', sans-serif; background: var(--gradient1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
        h2 { font-size: 1.5rem; font-weight: 800; margin: 14px 0 10px; }
        p { color: var(--text-secondary); font-size: 0.95rem; line-height: 1.9; margin-bottom: 30px; }
        .btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 13px 28px; border-radius: 12px; font-size: 0.95rem; font-weight: 700; text-decoration: none; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 8px; font-family: 'Cairo', sans-serif; }
        .btn-primary { background: var(--gradient1); color: #fff; box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(59, 130, 246, 0.5); }
        .btn-outline { background: transparent; color: var(--accent); border: 2px solid var(--accent); }
        .btn-outline:hover { background: rgba(59, 130, 246, 0.1); transform: translateY(-2px); }
        @media (max-width: 480px) { h1 { font-size: 5rem; } h2 { font-size: 1.2rem; } }
    </style>
</head>
<body>
    <div class="bg-animation"><div class="circle"></div><div class="circle"></div><div class="circle"></div></div>
    <div class="box">
        <div class="search-pill">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span class="q">الصفحة دي مش مفهرسة 😅</span>
            <span class="caret"></span>
        </div>
        <h1>404</h1>
        <h2>الصفحة اللي بتدور عليها مش موجودة</h2>
        <p>يمكن اللينك اتغير أو اتكتب غلط — بس متقلقش، حتى جوجل بيرجّع 404 أحيانًا. المهم الـ Redirect الصح 😉</p>
        <div class="btns">
            <a href="https://muhammedyasserbs.github.io/my-portfolio/" class="btn btn-primary">🏠 ارجع للرئيسية</a>
            <a href="https://muhammedyasserbs.github.io/my-portfolio/case-studies.html" class="btn btn-outline">📈 شوف الكيس استادي</a>
        </div>
    </div>
</body>
</html>
